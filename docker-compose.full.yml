services:

  db:
    image: postgres:16-alpine
    container_name: klassenbuch-db
    environment:
      POSTGRES_DB:       klassenbuch
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "klassenbuch"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  app:
    build: .
    container_name: klassenbuch-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL:  jdbc:postgresql://db:5432/klassenbuch
      DB_USER: postgres
      DB_PASS: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
